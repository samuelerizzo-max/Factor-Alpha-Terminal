name: Aggiorna ranking

on:
  schedule:
    # Ogni lunedi alle 06:00 UTC (07:00 in Italia, 10:00 a Dubai)
    - cron: '0 6 * * 1'
  workflow_dispatch: {}   # bottone "Run workflow" per lanciarlo a mano quando vuoi

permissions:
  contents: write   # serve per fare il commit automatico dei dati aggiornati

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa le dipendenze
        run: pip install -r requirements.txt

      - name: Costruisci il ranking (EDGAR + Yahoo Finance)
        run: python build_ranking.py

      - name: Commit e push dei dati aggiornati
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Aggiornamento automatico ranking"
          file_pattern: 'ranking.csv meta.json'
